<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MG University - BCom Subjects</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a1a3e 50%, #0d1b2a 100%);
            min-height: 100vh;
            color: #e0e0e0;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(100, 150, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
        }

        /* Header */
        .header {
            text-align: center;
            padding: 60px 20px 40px;
            position: relative;
            z-index: 1;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #a0b4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .header .subtitle {
            font-size: 1.2rem;
            color: #8b9dc3;
            font-weight: 300;
        }

        .header .divider {
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, #ff6b35, #f7931e, #ff6b35);
            margin: 20px auto;
            border-radius: 2px;
        }

        /* Main container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }

        /* Subject cards grid */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0 60px;
        }

        .subject-card {
            background: linear-gradient(145deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .subject-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: left 0.6s;
        }

        .subject-card:hover::before {
            left: 100%;
        }

        .subject-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(255, 107, 53, 0.5);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4), 0 0 30px rgba(255, 107, 53, 0.15);
        }

        .card-icon {
            font-size: 48px;
            margin-bottom: 15px;
            display: block;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.85rem;
            color: #8b9dc3;
            line-height: 1.5;
        }

        .card-arrow {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #ff6b35, #f7931e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s ease;
        }

        .subject-card:hover .card-arrow {
            opacity: 1;
            transform: translateX(0);
        }

        /* Instagram floating button */
        .instagram-float {
            position: fixed;
            bottom: 25px;
            right: 25px;
            width: 55px;
            height: 55px;
            background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 999;
            box-shadow: 0 8px 30px rgba(220, 39, 67, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .instagram-float:hover {
            transform: scale(1.15) rotate(5deg);
            box-shadow: 0 12px 40px rgba(220, 39, 67, 0.6);
        }

        .instagram-float svg {
            width: 28px;
            height: 28px;
            fill: white;
        }

        .instagram-float::after {
            content: 'Follow on Instagram';
            position: absolute;
            right: 65px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .instagram-float:hover::after {
            opacity: 1;
        }

        /* Modal styles */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-window {
            width: 95%;
            height: 95%;
            background: #0f0f23;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.6);
            animation: modalSlide 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
        }

        @keyframes modalSlide {
            from { transform: scale(0.9) translateY(30px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: linear-gradient(135deg, #1a1a3e, #0d1b2a);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .modal-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #ffffff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .modal-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: #e0e0e0;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .modal-btn:hover {
            background: rgba(255, 107, 53, 0.2);
            border-color: rgba(255, 107, 53, 0.4);
        }

        .modal-btn.close-btn {
            background: rgba(255, 80, 80, 0.15);
            border-color: rgba(255, 80, 80, 0.3);
        }

        .modal-btn.close-btn:hover {
            background: rgba(255, 80, 80, 0.3);
        }

        .modal-iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #ffffff;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 30px 20px 80px;
            color: #5a6a8a;
            font-size: 0.85rem;
            position: relative;
            z-index: 1;
        }

        .footer a {
            color: #ff6b35;
            text-decoration: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .cards-grid { grid-template-columns: 1fr; gap: 15px; }
            .subject-card { padding: 20px; }
            .modal-window { width: 98%; height: 98%; }
            .instagram-float { width: 48px; height: 48px; }
            .instagram-float svg { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>
    <!-- Background particles -->
    <div class="bg-particles" id="particles"></div>

    <!-- Header -->
    <header class="header">
        <h1>MG University BCom</h1>
        <p class="subtitle">Subject Study Portal</p>
        <div class="divider"></div>
    </header>

    <!-- Main Content -->
    <div class="container">
        <div class="cards-grid" id="cardsGrid"></div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© MG University BCom | Click any subject card to view its content</p>
    </footer>

    <!-- Instagram Floating Button -->
    <a href="https://www.instagram.com/albin___baby___?igsh=MTN4cXprb3A2dm8ybg==" target="_blank" class="instagram-float" title="Follow on Instagram">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
    </a>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-window">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">
                    <span id="modalIcon">📚</span>
                    <span id="modalSubjectName">Subject Name</span>
                </div>
                <div class="modal-controls">
                    <button class="modal-btn" onclick="toggleFullscreen()">
                        <span>⛶</span> Fullscreen
                    </button>
                    <button class="modal-btn close-btn" onclick="closeModal()">
                        <span>✕</span> Close
                    </button>
                </div>
            </div>
            <iframe class="modal-iframe" id="modalIframe" src=""></iframe>
        </div>
    </div>

    <script>
        // Subject data
        const subjects = [
            {
                id: 1,
                name: "Basic Finance for Daily Life",
                file: "Basic Finance for Daily Life.html",
                icon: "💰",
                desc: "Learn essential financial concepts and money management skills for everyday life."
            },
            {
                id: 2,
                name: "Corporate Regulation and Compliance",
                file: "Corporate regulation and completes.html",
                icon: "🏢",
                desc: "Understand corporate laws, regulations, and compliance requirements for businesses."
            },
            {
                id: 3,
                name: "Marketing Management",
                file: "marketing management.html",
                icon: "📊",
                desc: "Explore marketing strategies, consumer behavior, and brand management principles."
            },
            {
                id: 4,
                name: "Second Language - Malayalam",
                file: "second language malayalam.html",
                icon: "📖",
                desc: "Study Malayalam language, literature, and cultural heritage as a second language."
            },
            {
                id: 5,
                name: "മാധ്യമ പഠനം",
                file: "മാധ്യമ പഠനം.html",
                icon: "📺",
                desc: "Media Studies - Explore communication, journalism, and media literacy concepts."
            }
        ];

        // Create background particles
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                particle.style.width = (2 + Math.random() * 4) + 'px';
                particle.style.height = particle.style.width;
                container.appendChild(particle);
            }
        }

        // Render cards
        function renderCards() {
            const grid = document.getElementById('cardsGrid');
            subjects.forEach((subject, index) => {
                const card = document.createElement('div');
                card.className = 'subject-card';
                card.style.animationDelay = (index * 0.1) + 's';
                card.innerHTML = `
                    <span class="card-icon">${subject.icon}</span>
                    <h3 class="card-title">${subject.name}</h3>
                    <p class="card-desc">${subject.desc}</p>
                    <div class="card-arrow">→</div>
                `;
                card.onclick = () => openModal(subject);
                grid.appendChild(card);
            });
        }

        // Modal functions
        function openModal(subject) {
            const overlay = document.getElementById('modalOverlay');
            const iframe = document.getElementById('modalIframe');
            const title = document.getElementById('modalSubjectName');
            const icon = document.getElementById('modalIcon');

            title.textContent = subject.name;
            icon.textContent = subject.icon;
            iframe.src = subject.file;
            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const overlay = document.getElementById('modalOverlay');
            const iframe = document.getElementById('modalIframe');
            overlay.classList.remove('active');
            iframe.src = '';
            document.body.style.overflow = '';

            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        function toggleFullscreen() {
            const modalWindow = document.querySelector('.modal-window');
            if (!document.fullscreenElement) {
                modalWindow.requestFullscreen().catch(err => {
                    console.log('Fullscreen not supported');
                });
            } else {
                document.exitFullscreen();
            }
        }

        // Close on Escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Close on overlay click
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            renderCards();
        });
    </script>
</body>
</html>
